<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaAI — Register</title>
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>

    <nav>
      <div class="logo">Lingua<span>AI</span></div>
      <div class="nav-actions">
        <button
          class="btn btn-ghost"
          onclick="window.location.href = 'login.html'"
        >
          Log in
        </button>
        <button
          class="btn btn-primary"
          onclick="window.location.href = 'register.html'"
        >
          Get started
        </button>
      </div>
    </nav>

    <div class="page" style="position: relative; z-index: 1">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-header">
            <h1>Create account</h1>
            <p>Join LinguaAI and start chatting in any language.</p>
          </div>

          <div id="register-alert" class="alert hidden"></div>

          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              class="form-input"
              id="reg-username"
              type="text"
              placeholder="your_name"
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input
              class="form-input"
              id="reg-email"
              type="email"
              placeholder="you@email.com"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              class="form-input"
              id="reg-password"
              type="password"
              placeholder="min 6 characters"
            />
          </div>

          <button class="btn btn-primary form-submit" onclick="doRegister()">
            Create account →
          </button>

          <div class="form-switch">
            Already have an account? <a href="login.html">Sign in</a>
          </div>
        </div>
      </div>
    </div>

    <script src="static/js/api.js"></script>
    <script src="static/js/auth.js"></script>
    <script>
      // Override loginSuccess to redirect to assistant page
      function loginSuccess(token, username) {
        localStorage.setItem("lingua_token", token);
        localStorage.setItem("lingua_user", username);
        window.location.href = "index.html";
      }
      // redirect if already logged in
      if (localStorage.getItem("lingua_token"))
        window.location.href = "index.html";
    </script>
  </body>
</html>
